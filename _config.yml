title: Dromologue
tagline: We help you become AI native
url: https://dromologue.com
description: We help organisations become AI native, changing how they operate with AI, not just what they build.

# SEO / social sharing (jekyll-seo-tag)
author:
  name: Justin Arbuckle
logo: /assets/images/dromologue-mark.png
twitter:
  card: summary_large_image
social:
  name: Dromologue

permalink: /:slug

favicon: "/favicon.ico"

theme_config:
  appearance: "dark"
  appearance_toggle: false
  show_description: true
  show_navbar: false
  show_footer: true
  show_copyright: true
  show_projects: false
  show_blog: false
  show_old_projects: false
  show_misc_list: false

highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Drop a YYYY-MM-DD-title.md file into _posts/ and it becomes a page
# automatically; no need to set layout in each file.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Brand
  - README.md
  - LICENSE.txt
  - tasks

sass:
  style: compressed
